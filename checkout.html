<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | PINZO</title>
  <link rel="stylesheet" href="CSS/style.css">
</head>
<body>

  <header>
    <h1 class="logo" onclick="window.location.href='index.html'">PINZO</h1>

    <nav>
      <a href="index.html">Home</a>
      <a href="products.html">Sneakers</a>
      <a href="cart.html">Cart 🛒 <span id="cartCount">0</span></a>
      <a href="login.html">Login</a>
      <a href="signup.html">Signup</a>
    </nav>
  </header>

  <div class="checkout-container">

    <div class="checkout-form">
      <h2>Checkout</h2>

      <form id="checkoutForm">
        <input type="text" placeholder="Full Name" required>
        <input type="text" placeholder="Phone Number" required>
        <input type="text" placeholder="Address Line 1" required>
        <input type="text" placeholder="Address Line 2">
        <input type="text" placeholder="City" required>
        <input type="text" placeholder="State" required>
        <input type="text" placeholder="Pincode" required>

        <select required>
          <option value="">Select Payment Method</option>
          <option>Cash on Delivery</option>
          <option>UPI</option>
          <option>Credit / Debit Card</option>
        </select>

        <button type="submit">Place Order</button>
      </form>
    </div>

    <div class="order-summary">
      <h2>Order Summary</h2>
      <div id="checkoutItems"></div>
      <h3 id="checkoutTotal">Total: ₹0</h3>
    </div>

  </div>

  <footer>
    <p>© 2026 PINZO. All rights reserved.</p>
  </footer>

  <script src="JS/script.js"></script>

  <script>
    function displayCheckoutItems() {
      const cart = JSON.parse(localStorage.getItem("pinzoCart")) || [];
      const checkoutItems = document.getElementById("checkoutItems");
      const checkoutTotal = document.getElementById("checkoutTotal");

      checkoutItems.innerHTML = "";

      if (cart.length === 0) {
        checkoutItems.innerHTML = "<p>No items in cart.</p>";
        checkoutTotal.innerText = "Total: ₹0";
        return;
      }

      let total = 0;

      cart.forEach((item) => {
        const subtotal = item.price * item.quantity;
        total += subtotal;

        checkoutItems.innerHTML += `
          <div class="checkout-item">
            <p><strong>${item.name}</strong></p>
            <p>Brand: ${item.brand}</p>
            <p>Price: ₹${item.price}</p>
            <p>Quantity: ${item.quantity}</p>
            <p>Subtotal: ₹${subtotal}</p>
          </div>
        `;
      });

      checkoutTotal.innerText = "Total: ₹" + total;
    }

    document.getElementById("checkoutForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const cart = JSON.parse(localStorage.getItem("pinzoCart")) || [];

      if (cart.length === 0) {
        alert("Your cart is empty.");
        return;
      }

      alert("Order placed successfully!");
      localStorage.removeItem("pinzoCart");
      window.location.href = "index.html";
    });

    displayCheckoutItems();
  </script>
<footer>

<div class="footer-content">

<h2>PINZO</h2>

<p>Premium Sneakers for Street Culture</p>

<p>© 2026 PINZO. All rights reserved.</p>

</div>

</footer>
</body>
</html>
